<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b0b14">

<title>S ❤️ S</title>

<!-- FAVICON (ADD THIS) -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- THEME BUTTON -->
<button id="themeToggle" class="theme-btn">🌙</button>

<!-- FLOATING HEART BACKGROUND -->
<div class="floating-hearts">
  <span>❤</span><span>❤</span><span>❤</span><span>❤</span><span>❤</span><span>❤</span><span>❤</span><span>❤</span>
</div>

<main class="wrap">

  <section class="card">

    <!-- TITLE -->
    <h1>S <span>❤</span> S</h1>

    <!-- 💖 RESTORED CLEAN TEXT (FIXED UI) -->
    <p class="subtitle">
      Every second with you feels like forever 💗
    </p>

    <p class="label">
      We’ve been together for
    </p>

    <!-- DAYS -->
    <div class="days-box">
      <div id="days">0</div>
      <span>Days</span>
    </div>

    <!-- TIMER -->
    <div class="timer">
      <div class="box"><div id="hours">00</div><span>HOURS</span></div>
      <div class="box"><div id="minutes">00</div><span>MIN</span></div>
      <div class="box"><div id="seconds">00</div><span>SEC</span></div>
    </div>

    <!-- SINCE -->
    <p class="since">Since 18 April 2026</p>

    <!-- BUTTON -->
    <button id="loveBtn">💖 Feel the Love</button>

    <!-- LOVE NOTE -->
    <div class="noteBox">
      <p id="loveNote"></p>
    </div>

    <button id="installBtn" class="install-btn" style="display:none;">
📲 Install Our Love App
</button>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>

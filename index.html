<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8d7e8">

<title>Sugath ❤️ Sulina</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="floating-hearts">
  <span>❤</span><span>❤</span><span>❤</span><span>❤</span><span>❤</span>
</div>

<main class="wrap">

  <section class="card">

    <div class="top">
      <h1>Sugath <span>❤</span> Sulina</h1>
      <p>Every second with you feels like forever 💗</p>
    </div>

    <div class="counter-title">
      We’ve been together for
    </div>

    <div class="days-box">
      <div id="days">0</div>
      <span>Days</span>
    </div>

    <div class="timer">
      <div class="box">
        <div id="hours">00</div>
        <span>HOURS</span>
      </div>

      <div class="box">
        <div id="minutes">00</div>
        <span>MINUTES</span>
      </div>

      <div class="box">
        <div id="seconds">00</div>
        <span>SECONDS</span>
      </div>
    </div>

    <div class="since">Since 11 May 2025</div>

    <button id="loveBtn">💌 Tap for Love Note</button>
    <p id="loveNote"></p>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f8d7e8">

<title>Sugath ❤️ Sulina</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="floating-hearts">
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
</div>

<main class="wrap">

<section class="hero-card glass">

<div class="flower">🌹</div>

<h1>
Sugath <span class="heart">❤</span> Sulina
</h1>

<p class="quote">
Every second with you is a piece of forever.
</p>

<div class="counter-label">
We've been in love for
</div>

<div class="daysBox">
<span id="days">0</span>
<small>Days Together</small>
</div>

<div class="time-grid">
<div>
<span id="hours">00</span>
<small>Hours</small>
</div>

<div>
<span id="minutes">00</span>
<small>Minutes</small>
</div>

<div>
<span id="seconds">00</span>
<small>Seconds</small>
</div>
</div>

<p class="since">
Since 11 May 2025
</p>

<button id="loveBtn">
Tap for a Love Note
</button>

<p id="loveNote"></p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>

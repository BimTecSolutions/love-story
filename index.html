<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b0b14">

<title>Sugath ❤️ Sulina</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>
  <button id="themeToggle" class="theme-btn">🌙</button>

<div class="bg"></div>

<!-- multiple floating hearts -->
<div class="floating-hearts">
  <span>❤</span><span>❤</span><span>❤</span><span>❤</span><span>❤</span>
</div>

<main class="wrap">

  <section class="card">

    <h1>S <span>❤</span> S</h1>

    <p class="subtitle">Every second with you feels like forever 💗</p>

    <p class="label">We’ve been together for</p>

    <div class="days-box">
      <div id="days">0</div>
      <span>Days</span>
    </div>

    <div class="timer">
      <div class="box"><div id="hours">00</div><span>HOURS</span></div>
      <div class="box"><div id="minutes">00</div><span>MIN</span></div>
      <div class="box"><div id="seconds">00</div><span>SEC</span></div>
    </div>

    <p class="since">Since 11 May 2025</p>

    <button id="loveBtn">💌 Tap for Love Note</button>

    <!-- fixed height container (no UI jump) -->
    <div class="noteBox">
      <p id="loveNote"></p>
    </div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
